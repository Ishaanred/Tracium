name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev librsvg2-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Sidecar must exist for the Tauri build step (externalBin).
      - name: Fetch sidecars
        run: bash scripts/fetch-sidecars.sh

      - name: Frontend typecheck + build
        run: pnpm build

      - name: Test the core crates (no GUI needed)
        run: cargo test -p tracium-store -p tracium-probe -p tracium-monitor

      - name: Build the whole workspace (GUI app + daemon compile)
        run: cargo build --workspace
