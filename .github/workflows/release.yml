name: Release

# Push a tag like v0.1.0 to build + publish a draft GitHub Release with the
# desktop bundles (.deb/.AppImage/.msi) and the traciumd daemon binaries.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev librsvg2-dev libayatana-appindicator3-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch bundled sidecars (librespeed-cli)
        run: bash scripts/fetch-sidecars.sh
        shell: bash

      - name: Build + publish desktop bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Tracium ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false

  daemon:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, ext: "" }
          - { os: windows-latest, ext: ".exe" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build traciumd (release)
        run: cargo build --release -p tracium-cli

      - name: Stage binary with an OS-specific name
        shell: bash
        run: |
          mkdir -p dist-bin
          cp "target/release/traciumd${{ matrix.ext }}" \
             "dist-bin/traciumd-${{ runner.os }}-x86_64${{ matrix.ext }}"

      - name: Attach daemon binary to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: dist-bin/*
